<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🔥 HIIT-LOG</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --sub: #94a3b8;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --danger: #ef4444;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 560px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .label {
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .phase {
      font-size: 20px;
      font-weight: 600;
    }

    .progress-wrap {
      margin: 18px 0 22px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .bar {
      height: 12px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.2s linear;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    #startBtn {
      background: var(--accent);
      color: #062b12;
    }

    #stopBtn {
      background: #1f2937;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .history {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .history-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .history-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .history-count {
      color: var(--sub);
      font-size: 13px;
    }

    .history-weekdays,
    .history-week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .history-weekdays {
      margin-bottom: 8px;
      color: var(--sub);
      font-size: 12px;
      text-align: center;
    }

    .history-graph {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .history-cell {
      min-height: 28px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: #0b1220;
    }

    .history-cell.level-1 {
      background: #123d28;
      border-color: #1f6f46;
    }

    .history-cell.level-2 {
      background: #166534;
      border-color: #22c55e;
    }

    .history-cell.level-3 {
      background: #15803d;
      border-color: #4ade80;
    }

    .history-cell.level-4 {
      background: #22c55e;
      border-color: #86efac;
    }

    .history-log-wrap {
      display: grid;
      gap: 8px;
    }

    .history-log-label {
      color: var(--sub);
      font-size: 12px;
    }

    .history-log {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
      max-height: 220px;
      overflow: auto;
    }

    .history-log-item {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }

    .history-empty {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .history-status {
      min-height: 1.2em;
      margin: 10px 0 0;
      color: #fca5a5;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .grid,
      .buttons {
        grid-template-columns: 1fr;
      }

      .history-title {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🔥 HIIT-LOG</h1>

    <section class="grid">
      <div class="card">
        <div class="label">現在のセット</div>
        <div class="value"><span id="setNow">0</span> / 8</div>
      </div>
      <div class="card">
        <div class="label">状態</div>
        <div class="phase" id="phase">⏳ 待機中</div>
      </div>
      <div class="card">
        <div class="label">次の合図まで</div>
        <div class="value" id="countdown">--</div>
      </div>
      <div class="card">
        <div class="label">経過時間</div>
        <div class="value" id="elapsed">00:00</div>
      </div>
    </section>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>全体進捗</span>
        <span id="progressText">0 / 8 セット完了</span>
      </div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div class="buttons">
      <button id="startBtn">開始</button>
      <button id="stopBtn">停止・リセット</button>
    </div>

    <section class="history" aria-labelledby="historyHeading">
      <div class="history-title">
        <h2 id="historyHeading">コミットログ</h2>
        <span class="history-count" id="historyCount">コミット数: 0件</span>
      </div>
      <div class="history-weekdays" aria-hidden="true">
        <span>月</span>
        <span>火</span>
        <span>水</span>
        <span>木</span>
        <span>金</span>
        <span>土</span>
        <span>日</span>
      </div>
      <div class="history-graph" id="historyGraph"></div>
      <p class="history-empty" id="historyEmpty">まだ草は生えていません。</p>
      <div class="history-log-wrap" id="historyLogWrap" hidden>
        <div class="history-log-label">最近のコミット</div>
        <ul class="history-log" id="historyLog"></ul>
      </div>
      <p class="history-status" id="historyStatus" aria-live="polite"></p>
    </section>
  </main>

  <script src="nosleep.min.js"></script>
  <script>
    const TOTAL_SETS = 8;
    const FIRST_BEEP_SEC = 20;
    const SECOND_BEEP_SEC = 30;
    const SET_DURATION_SEC = 30;
    const START_COUNTDOWN_SEC = 5;
    const HISTORY_KEY = 'hiit-log-history-v2';
    const LEGACY_HISTORY_KEYS = ['hiit-log-history'];
    const DAY_LABELS = ['月', '火', '水', '木', '金', '土', '日'];
    const COUNTDOWN_CUE_COUNT = 3;
    const RECENT_HISTORY_LIMIT = 21;

    let audioContext = null;
    let scheduledTimers = [];
    let intervalId = null;
    let appState = 'idle';
    let countdownStartAt = 0;
    let workoutStartAt = 0;
    let workoutEndAt = 0;
    let wakeLockSentinel = null;
    let noSleepController = null;
    let noSleepEnabled = false;
    let completionHistory = [];
    let historyStatusMessage = '';
    let runtimeStatusMessage = '';

    const setNowEl = document.getElementById('setNow');
    const phaseEl = document.getElementById('phase');
    const countdownEl = document.getElementById('countdown');
    const elapsedEl = document.getElementById('elapsed');
    const progressFillEl = document.getElementById('progressFill');
    const progressTextEl = document.getElementById('progressText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const historyGraphEl = document.getElementById('historyGraph');
    const historyEmptyEl = document.getElementById('historyEmpty');
    const historyLogWrapEl = document.getElementById('historyLogWrap');
    const historyLogEl = document.getElementById('historyLog');
    const historyCountEl = document.getElementById('historyCount');
    const historyStatusEl = document.getElementById('historyStatus');

    function formatMMSS(totalSeconds) {
      const seconds = Math.max(0, Math.floor(totalSeconds));
      const minutesText = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secondsText = String(seconds % 60).padStart(2, '0');
      return `${minutesText}:${secondsText}`;
    }

    function formatDateTime(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
    }

    function formatDateLabel(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}/${month}/${day}`;
    }

    function formatHistoryEntry(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return formatDateTime(date);
    }

    function renderStatusMessage() {
      historyStatusEl.textContent = runtimeStatusMessage || historyStatusMessage;
    }

    function setHistoryStatus(message = '') {
      historyStatusMessage = message;
      renderStatusMessage();
    }

    function setRuntimeStatus(message = '') {
      runtimeStatusMessage = message;
      renderStatusMessage();
    }

    function isSessionActive() {
      return appState === 'countdown' || appState === 'running';
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getMondayIndex(date) {
      const day = date.getDay();
      return day === 0 ? 6 : day - 1;
    }

    function getWeekStart(date) {
      const weekStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      weekStart.setHours(0, 0, 0, 0);
      weekStart.setDate(weekStart.getDate() - getMondayIndex(weekStart));
      return weekStart;
    }

    function getHistoryLevel(count) {
      if (count <= 0) {
        return 0;
      }

      if (count === 1) {
        return 1;
      }

      if (count === 2) {
        return 2;
      }

      if (count === 3) {
        return 3;
      }

      return 4;
    }

    function supportsNativeWakeLock() {
      return 'wakeLock' in navigator && typeof navigator.wakeLock.request === 'function';
    }

    function getNoSleepController() {
      if (!noSleepController && typeof window.NoSleep === 'function') {
        noSleepController = new window.NoSleep();
      }

      return noSleepController;
    }

    function normalizeHistoryEntries(value) {
      if (Array.isArray(value)) {
        return value.filter((entry) => typeof entry === 'string');
      }

      if (value && typeof value === 'object' && Array.isArray(value.entries)) {
        return value.entries.filter((entry) => typeof entry === 'string');
      }

      throw new Error('Stored history data is invalid.');
    }

    function dedupeHistoryEntries(entries) {
      return [...new Set(entries)].sort();
    }

    function readHistoryFromStorage() {
      const mergedEntries = [];
      let hasInvalidEntry = false;

      for (const key of [HISTORY_KEY, ...LEGACY_HISTORY_KEYS]) {
        const raw = localStorage.getItem(key);
        if (raw === null) {
          continue;
        }

        try {
          const parsed = JSON.parse(raw);
          mergedEntries.push(...normalizeHistoryEntries(parsed));
        } catch (error) {
          console.error(error);
          hasInvalidEntry = true;
        }
      }

      if (hasInvalidEntry && mergedEntries.length === 0) {
        throw new Error('Stored history data is invalid.');
      }

      return dedupeHistoryEntries(mergedEntries);
    }

    function writeHistoryToStorage(entries) {
      const normalizedEntries = dedupeHistoryEntries(entries);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(normalizedEntries));

      LEGACY_HISTORY_KEYS.forEach((key) => {
        localStorage.setItem(key, JSON.stringify(normalizedEntries));
      });
    }

    function renderHistory() {
      historyCountEl.textContent = `コミット数: ${completionHistory.length}件`;

      const validEntries = completionHistory
        .map((entry) => ({ raw: entry, date: new Date(entry) }))
        .filter(({ date }) => !Number.isNaN(date.getTime()))
        .sort((left, right) => left.date - right.date);

      if (validEntries.length === 0) {
        historyGraphEl.replaceChildren();
        historyLogEl.replaceChildren();
        historyGraphEl.hidden = true;
        historyLogWrapEl.hidden = true;
        historyEmptyEl.hidden = false;
        return;
      }

      const countsByDate = new Map();
      validEntries.forEach(({ date }) => {
        const key = formatDateKey(date);
        countsByDate.set(key, (countsByDate.get(key) ?? 0) + 1);
      });

      const oldestWeekStart = getWeekStart(validEntries[0].date);
      const newestWeekStart = getWeekStart(validEntries[validEntries.length - 1].date);
      const weekRows = [];

      for (let cursor = new Date(newestWeekStart); cursor >= oldestWeekStart; cursor.setDate(cursor.getDate() - 7)) {
        const weekRow = document.createElement('div');
        weekRow.className = 'history-week';

        for (let dayOffset = 0; dayOffset < DAY_LABELS.length; dayOffset += 1) {
          const cellDate = new Date(cursor);
          cellDate.setDate(cursor.getDate() + dayOffset);
          const count = countsByDate.get(formatDateKey(cellDate)) ?? 0;
          const cell = document.createElement('div');
          cell.className = `history-cell level-${getHistoryLevel(count)}`;
          cell.setAttribute('role', 'img');
          cell.setAttribute('aria-label', `${formatDateLabel(cellDate)} ${count}件`);
          cell.title = `${formatDateLabel(cellDate)} ${count}件`;
          weekRow.appendChild(cell);
        }

        weekRows.push(weekRow);
      }

      const recentItems = validEntries
        .slice()
        .reverse()
        .slice(0, RECENT_HISTORY_LIMIT)
        .map(({ raw }) => {
          const item = document.createElement('li');
          item.className = 'history-log-item';
          item.textContent = formatHistoryEntry(raw);
          return item;
        });

      historyGraphEl.replaceChildren(...weekRows);
      historyLogEl.replaceChildren(...recentItems);
      historyGraphEl.hidden = false;
      historyLogWrapEl.hidden = recentItems.length === 0;
      historyEmptyEl.hidden = true;
    }

    function loadHistory() {
      try {
        completionHistory = readHistoryFromStorage();
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        completionHistory = [];
        setHistoryStatus('履歴の読み込みに失敗しました。ブラウザーの保存データを確認してください。');
      }

      renderHistory();
    }

    function recordCompletion() {
      const nextHistory = dedupeHistoryEntries([...completionHistory, new Date().toISOString()]);

      try {
        writeHistoryToStorage(nextHistory);
        completionHistory = nextHistory;
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        setHistoryStatus('履歴の保存に失敗しました。ブラウザーの保存容量を確認してください。');
      }

      renderHistory();
    }

    function createAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        throw new Error('Web Audio API is not supported in this browser.');
      }

      if (!audioContext) {
        audioContext = new AudioContextClass();
      }

      return audioContext;
    }

    async function ensureAudioReady() {
      const ctx = createAudioContext();
      if (ctx.state === 'suspended') {
        await ctx.resume();
      }
    }

    function handleWakeLockRelease() {
      wakeLockSentinel = null;
      if (!isSessionActive() || document.visibilityState !== 'visible') {
        return;
      }

      void requestWakeLock();
    }

    async function enableNoSleepFallback() {
      const controller = getNoSleepController();
      if (!controller) {
        setRuntimeStatus('このブラウザーでは画面スリープ防止に対応していません。');
        return;
      }

      try {
        if (!noSleepEnabled) {
          await controller.enable();
          noSleepEnabled = true;
        }

        setRuntimeStatus('');
      } catch (error) {
        console.error(error);
        noSleepEnabled = false;
        setRuntimeStatus('画面スリープ防止を開始できませんでした。');
      }
    }

    function disableNoSleepFallback() {
      if (!noSleepEnabled) {
        return;
      }

      const controller = getNoSleepController();
      if (!controller) {
        noSleepEnabled = false;
        return;
      }

      controller.disable();
      noSleepEnabled = false;
    }

    async function requestWakeLock(options = {}) {
      const { fromUserGesture = false } = options;

      if (!isSessionActive() || document.visibilityState !== 'visible') {
        return;
      }

      if (!supportsNativeWakeLock()) {
        if (noSleepEnabled) {
          setRuntimeStatus('');
          return;
        }

        if (!fromUserGesture) {
          setRuntimeStatus('このブラウザーでは開始時のみ画面スリープ防止を有効化できます。');
          return;
        }

        await enableNoSleepFallback();
        return;
      }

      try {
        if (wakeLockSentinel && !wakeLockSentinel.released) {
          setRuntimeStatus('');
          return;
        }

        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', handleWakeLockRelease);
        setRuntimeStatus('');
      } catch (error) {
        console.error(error);
        wakeLockSentinel = null;
        setRuntimeStatus('画面スリープ防止を開始できませんでした。');
      }
    }

    async function releaseWakeLock() {
      if (!wakeLockSentinel) {
        return;
      }

      const currentWakeLock = wakeLockSentinel;
      wakeLockSentinel = null;

      try {
        await currentWakeLock.release();
      } catch (error) {
        console.error(error);
      }
    }

    async function stopSleepPrevention() {
      disableNoSleepFallback();
      await releaseWakeLock();
    }

    function playTone({ duration, frequency, type, peakGain, offset = 0, sweepTo = frequency }) {
      if (!audioContext) {
        return;
      }

      const startTime = audioContext.currentTime + offset;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      oscillator.frequency.exponentialRampToValueAtTime(sweepTo, startTime + duration);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function playCountdownBeep() {
      playTone({
        duration: 0.18,
        frequency: 880,
        sweepTo: 880,
        type: 'sine',
        peakGain: 0.18
      });
    }

    function playBrightEndingCue() {
      playTone({
        duration: 0.14,
        frequency: 520,
        sweepTo: 580,
        type: 'sine',
        peakGain: 0.12
      });
      playTone({
        duration: 0.14,
        frequency: 680,
        sweepTo: 760,
        type: 'sine',
        peakGain: 0.12,
        offset: 0.16
      });
      playTone({
        duration: 0.38,
        frequency: 860,
        sweepTo: 980,
        type: 'triangle',
        peakGain: 0.16,
        offset: 0.34
      });
    }

    function playWorkoutStartCue() {
      playBrightEndingCue();
    }

    function playWorkoutEndCue() {
      playBrightEndingCue();
    }

    function playOverallEndCue() {
      playBrightEndingCue();
    }

    function scheduleCountdownSeries(targetDelayMs, shouldPlay = () => true) {
      for (let secondsBefore = COUNTDOWN_CUE_COUNT; secondsBefore >= 1; secondsBefore -= 1) {
        const delayMs = targetDelayMs - (secondsBefore * 1000);
        if (delayMs < 0) {
          continue;
        }

        schedule(() => {
          if (!shouldPlay()) {
            return;
          }

          playCountdownBeep();
        }, delayMs);
      }
    }

    function clearAllTimers() {
      scheduledTimers.forEach(clearTimeout);
      scheduledTimers = [];

      if (intervalId !== null) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function schedule(callback, delayMs) {
      const timerId = setTimeout(callback, delayMs);
      scheduledTimers.push(timerId);
      return timerId;
    }

    function resetDisplay() {
      appState = 'idle';
      setNowEl.textContent = '0';
      phaseEl.textContent = '⏳ 待機中';
      countdownEl.textContent = '--';
      elapsedEl.textContent = '00:00';
      progressFillEl.style.width = '0%';
      progressTextEl.textContent = '0 / 8 セット完了';
      startBtn.disabled = false;
    }

    function showCompletedDisplay() {
      appState = 'done';
      setNowEl.textContent = String(TOTAL_SETS);
      phaseEl.textContent = '⏳ 待機中';
      countdownEl.textContent = '00';
      elapsedEl.textContent = formatMMSS(TOTAL_SETS * SET_DURATION_SEC);
      progressFillEl.style.width = '100%';
      progressTextEl.textContent = '8 / 8 セット完了';
      startBtn.disabled = false;
    }

    function stopSequence() {
      clearAllTimers();
      resetDisplay();
      setRuntimeStatus('');
      void stopSleepPrevention();
    }

    function getCurrentSet(elapsedSec) {
      return Math.min(TOTAL_SETS, Math.floor(elapsedSec / SET_DURATION_SEC) + 1);
    }

    function updateCountdownUI(now) {
      const elapsedSec = (now - countdownStartAt) / 1000;
      const remainingSec = Math.max(0, START_COUNTDOWN_SEC - elapsedSec);

      setNowEl.textContent = '0';
      phaseEl.textContent = '⏳ 待機中';
      countdownEl.textContent = String(Math.ceil(remainingSec)).padStart(2, '0');
      elapsedEl.textContent = '00:00';
      progressFillEl.style.width = '0%';
      progressTextEl.textContent = '0 / 8 セット完了';
    }

    function updateWorkoutUI(now) {
      const elapsedSec = (now - workoutStartAt) / 1000;
      const remainingTotal = Math.max(0, (workoutEndAt - now) / 1000);

      elapsedEl.textContent = formatMMSS(elapsedSec);

      if (remainingTotal <= 0) {
        finishWorkout();
        return;
      }

      const currentSet = getCurrentSet(elapsedSec);
      const setElapsed = elapsedSec % SET_DURATION_SEC;
      const nextBeepIn = setElapsed < FIRST_BEEP_SEC
        ? FIRST_BEEP_SEC - setElapsed
        : SECOND_BEEP_SEC - setElapsed;

      setNowEl.textContent = String(currentSet);
      phaseEl.textContent = setElapsed < FIRST_BEEP_SEC ? '💪 運動中' : '😌 休憩中';
      countdownEl.textContent = String(Math.ceil(nextBeepIn)).padStart(2, '0');

      const completedSets = Math.floor(elapsedSec / SET_DURATION_SEC);
      const percent = Math.min(100, (elapsedSec / (TOTAL_SETS * SET_DURATION_SEC)) * 100);
      progressFillEl.style.width = `${percent}%`;
      progressTextEl.textContent = `${completedSets} / 8 セット完了`;
    }

    function updateUI() {
      const now = performance.now();

      if (appState === 'countdown') {
        updateCountdownUI(now);
        return;
      }

      if (appState === 'running') {
        updateWorkoutUI(now);
      }
    }

    function finishWorkout() {
      if (appState !== 'running') {
        return;
      }

      clearAllTimers();
      showCompletedDisplay();
      recordCompletion();
      playOverallEndCue();
      setRuntimeStatus('');
      void stopSleepPrevention();
    }

    function beginWorkout() {
      appState = 'running';
      workoutStartAt = performance.now();
      workoutEndAt = workoutStartAt + TOTAL_SETS * SET_DURATION_SEC * 1000;
      void requestWakeLock();
      playWorkoutStartCue();

      for (let index = 0; index < TOTAL_SETS; index += 1) {
        const setIndex = index + 1;
        const baseDelay = index * SET_DURATION_SEC * 1000;
        const workoutEndDelay = baseDelay + FIRST_BEEP_SEC * 1000;
        const restEndDelay = baseDelay + SECOND_BEEP_SEC * 1000;

        scheduleCountdownSeries(workoutEndDelay, () => appState === 'running');

        schedule(() => {
          if (appState !== 'running') {
            return;
          }

          playWorkoutEndCue();
        }, workoutEndDelay);

        scheduleCountdownSeries(restEndDelay, () => appState === 'running');
        if (setIndex < TOTAL_SETS) {
          schedule(() => {
            if (appState !== 'running') {
              return;
            }

            playWorkoutStartCue();
            progressTextEl.textContent = `${setIndex} / 8 セット完了`;
            progressFillEl.style.width = `${(setIndex / TOTAL_SETS) * 100}%`;
          }, restEndDelay);
        }
      }

      schedule(() => {
        if (appState !== 'running') {
          return;
        }

        finishWorkout();
      }, TOTAL_SETS * SET_DURATION_SEC * 1000);

      updateUI();
    }

    async function startSequence() {
      if (appState === 'countdown' || appState === 'running') {
        return;
      }

      startBtn.disabled = true;
      setHistoryStatus();
      setRuntimeStatus('');

      clearAllTimers();
      appState = 'countdown';
      countdownStartAt = performance.now();

      const wakeLockPromise = requestWakeLock({ fromUserGesture: true });

      try {
        await ensureAudioReady();
        await wakeLockPromise;
      } catch (error) {
        console.error(error);
        resetDisplay();
        setRuntimeStatus('音声を開始できませんでした。');
        void stopSleepPrevention();
        return;
      }

      updateUI();
      intervalId = setInterval(updateUI, 100);
      scheduleCountdownSeries(START_COUNTDOWN_SEC * 1000, () => appState === 'countdown');

      schedule(() => {
        if (appState !== 'countdown') {
          return;
        }

        beginWorkout();
      }, START_COUNTDOWN_SEC * 1000);
    }

    document.addEventListener('visibilitychange', () => {
      if (!isSessionActive()) {
        return;
      }

      if (document.visibilityState === 'visible') {
        void requestWakeLock();
        return;
      }

      void releaseWakeLock();
    });

    window.addEventListener('pageshow', () => {
      if (!isSessionActive()) {
        return;
      }

      void requestWakeLock();
    });

    startBtn.addEventListener('click', startSequence);
    stopBtn.addEventListener('click', stopSequence);

    loadHistory();
    resetDisplay();
  </script>
</body>
</html>
