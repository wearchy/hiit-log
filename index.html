<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>🔥 HIIT-LOG</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --sub: #94a3b8;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --danger: #ef4444;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 560px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.2;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      min-width: 0;
    }

    .label {
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 8px;
      text-align: center;
    }

    .value {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .phase {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 700;
      text-align: center;
    }

    .progress-wrap {
      margin: 18px 0 22px;
    }

    .bar {
      height: 12px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.2s linear;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    #startBtn {
      background: var(--accent);
      color: #062b12;
    }

    #startBtn.is-stop {
      background: var(--danger);
      color: #fff1f2;
    }

    .history {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .history-title {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .history-count {
      color: var(--sub);
      font-size: 13px;
    }

    .history-download-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      cursor: pointer;
      touch-action: manipulation;
      transition: color 0.15s, border-color 0.15s;
    }

    .history-download-btn:hover {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    .history-download-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .history-weekdays,
    .history-week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .history-weekdays {
      margin-bottom: 8px;
      color: var(--sub);
      font-size: 12px;
      text-align: center;
    }

    .history-graph {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .history-cell {
      min-height: 28px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: #0b1220;
    }

    .history-cell.level-1 {
      background: #123d28;
      border-color: #1f6f46;
    }

    .history-cell.level-2 {
      background: #166534;
      border-color: #22c55e;
    }

    .history-cell.level-3 {
      background: #15803d;
      border-color: #4ade80;
    }

    .history-cell.level-4 {
      background: #22c55e;
      border-color: #86efac;
    }

    .history-log-wrap {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .history-log {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
      max-height: 220px;
      overflow: auto;
    }

    .history-log-item {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }

    .history-empty {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .history-status {
      min-height: 1.2em;
      margin: 10px 0 0;
      color: #fca5a5;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .buttons {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 14px;
      }

      .value {
        font-size: clamp(22px, 7vw, 32px);
      }

      .phase {
        font-size: clamp(22px, 7vw, 32px);
      }

      .history-title {
        justify-content: flex-end;
      }

      .history-weekdays,
      .history-week {
        gap: 6px;
      }

      .history-cell {
        min-height: 24px;
        border-radius: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🔥 HIIT-LOG</h1>

    <section class="grid">
      <div class="grid-row">
        <div class="card">
          <div class="label">Set</div>
          <div class="value"><span id="setNow">0</span> / 8</div>
        </div>
        <div class="card">
          <div class="label">Status</div>
          <div class="phase" id="phase">⏳ Wait</div>
        </div>
      </div>
      <div class="grid-row">
        <div class="card">
          <div class="label">Next</div>
          <div class="value" id="countdown">--</div>
        </div>
        <div class="card">
          <div class="label">Time</div>
          <div class="value" id="elapsed">00:00</div>
        </div>
      </div>
    </section>

    <div class="progress-wrap">
      <div class="bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div class="buttons">
      <button id="startBtn">Start</button>
    </div>

    <section class="history">
      <div class="history-title">
        <span class="history-count" id="historyCount">0 commits</span>
      </div>
      <div class="history-weekdays" aria-hidden="true">
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
        <span>Sun</span>
      </div>
      <div class="history-graph" id="historyGraph"></div>
      <div class="history-log-wrap" id="historyLogWrap" hidden>
        <ul class="history-log" id="historyLog"></ul>
      </div>
      <p class="history-status" id="historyStatus" aria-live="polite"></p>
    </section>
  </main>

  <script src="nosleep.min.js"></script>
  <script>
    const TOTAL_SETS = 8;
    const EXERCISE_DURATION_SEC = 20;
    const REST_DURATION_SEC = 10;
    const SET_DURATION_SEC = 30;
    const TOTAL_WORKOUT_SEC = TOTAL_SETS * SET_DURATION_SEC;
    const NIGHT_CUTOFF_HOUR = 2;
    const HISTORY_KEY = 'hiit-log-history-v2';
    const LEGACY_HISTORY_KEYS = ['hiit-log-history'];
    const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const COUNTDOWN_CUE_COUNT = 3;
    const RECENT_HISTORY_LIMIT = 21;
    const SEED_HISTORY = [
      '2026-04-01T14:23:14.000Z',
      '2026-04-02T15:14:38.000Z',
    ];

    let audioContext = null;
    let scheduledTimers = [];
    let intervalId = null;
    let appState = 'idle';
    let workoutStartAt = 0;
    let workoutEndAt = 0;
    let wakeLockSentinel = null;
    let noSleepController = null;
    let noSleepEnabled = false;
    let completionHistory = [];
    let historyStatusMessage = '';
    let runtimeStatusMessage = '';

    const setNowEl = document.getElementById('setNow');
    const phaseEl = document.getElementById('phase');
    const countdownEl = document.getElementById('countdown');
    const elapsedEl = document.getElementById('elapsed');
    const progressFillEl = document.getElementById('progressFill');
    const startBtn = document.getElementById('startBtn');
    const historyGraphEl = document.getElementById('historyGraph');
    const historyLogWrapEl = document.getElementById('historyLogWrap');
    const historyLogEl = document.getElementById('historyLog');
    const historyCountEl = document.getElementById('historyCount');
    const historyStatusEl = document.getElementById('historyStatus');

    function formatMMSS(totalSeconds) {
      const seconds = Math.max(0, Math.floor(totalSeconds));
      const minutesText = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secondsText = String(seconds % 60).padStart(2, '0');
      return `${minutesText}:${secondsText}`;
    }

    function formatDateTime(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
    }

    function formatDateLabel(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}/${month}/${day}`;
    }

    function formatHistoryEntry(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return formatDateTime(date);
    }

    function renderStatusMessage() {
      historyStatusEl.textContent = runtimeStatusMessage || historyStatusMessage;
    }

    function setHistoryStatus(message = '') {
      historyStatusMessage = message;
      renderStatusMessage();
    }

    function setRuntimeStatus(message = '') {
      runtimeStatusMessage = message;
      renderStatusMessage();
    }

    function isSessionActive() {
      return appState === 'running';
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getMondayIndex(date) {
      const day = date.getDay();
      return day === 0 ? 6 : day - 1;
    }

    function getWeekStart(date) {
      const weekStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      weekStart.setHours(0, 0, 0, 0);
      weekStart.setDate(weekStart.getDate() - getMondayIndex(weekStart));
      return weekStart;
    }

    function getLogicalDate(date) {
      if (date.getHours() < NIGHT_CUTOFF_HOUR) {
        const adjusted = new Date(date);
        adjusted.setDate(adjusted.getDate() - 1);
        return adjusted;
      }

      return date;
    }

    function getHistoryLevel(count) {
      if (count <= 0) {
        return 0;
      }

      if (count === 1) {
        return 1;
      }

      if (count === 2) {
        return 2;
      }

      if (count === 3) {
        return 3;
      }

      return 4;
    }

    function supportsNativeWakeLock() {
      return 'wakeLock' in navigator && typeof navigator.wakeLock.request === 'function';
    }

    function getNoSleepController() {
      if (!noSleepController && typeof window.NoSleep === 'function') {
        noSleepController = new window.NoSleep();
      }

      return noSleepController;
    }

    function normalizeHistoryEntries(value) {
      if (Array.isArray(value)) {
        return value.filter((entry) => typeof entry === 'string');
      }

      if (value && typeof value === 'object' && Array.isArray(value.entries)) {
        return value.entries.filter((entry) => typeof entry === 'string');
      }

      throw new Error('Stored history data is invalid.');
    }

    function dedupeHistoryEntries(entries) {
      return [...new Set(entries)].sort();
    }

    function readHistoryFromStorage() {
      const mergedEntries = [];
      let hasInvalidEntry = false;

      for (const key of [HISTORY_KEY, ...LEGACY_HISTORY_KEYS]) {
        const raw = localStorage.getItem(key);
        if (raw === null) {
          continue;
        }

        try {
          const parsed = JSON.parse(raw);
          mergedEntries.push(...normalizeHistoryEntries(parsed));
        } catch (error) {
          console.error(error);
          hasInvalidEntry = true;
        }
      }

      if (hasInvalidEntry && mergedEntries.length === 0) {
        throw new Error('Stored history data is invalid.');
      }

      return dedupeHistoryEntries(mergedEntries);
    }

    function writeHistoryToStorage(entries) {
      const normalizedEntries = dedupeHistoryEntries(entries);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(normalizedEntries));

      LEGACY_HISTORY_KEYS.forEach((key) => {
        localStorage.setItem(key, JSON.stringify(normalizedEntries));
      });
    }

    function renderHistory() {
      historyCountEl.textContent = `${completionHistory.length} commits`;

      const validEntries = completionHistory
        .map((entry) => ({ raw: entry, date: new Date(entry) }))
        .filter(({ date }) => !Number.isNaN(date.getTime()))
        .sort((left, right) => left.date - right.date);

      if (validEntries.length === 0) {
        historyGraphEl.replaceChildren();
        historyLogEl.replaceChildren();
        historyGraphEl.hidden = true;
        historyLogWrapEl.hidden = true;
        return;
      }

      const countsByDate = new Map();
      validEntries.forEach(({ date }) => {
        const key = formatDateKey(getLogicalDate(date));
        countsByDate.set(key, (countsByDate.get(key) ?? 0) + 1);
      });

      const oldestWeekStart = getWeekStart(getLogicalDate(validEntries[0].date));
      const newestWeekStart = getWeekStart(getLogicalDate(validEntries[validEntries.length - 1].date));
      const weekRows = [];

      for (let cursor = new Date(newestWeekStart); cursor >= oldestWeekStart; cursor.setDate(cursor.getDate() - 7)) {
        const weekRow = document.createElement('div');
        weekRow.className = 'history-week';

        for (let dayOffset = 0; dayOffset < DAY_LABELS.length; dayOffset += 1) {
          const cellDate = new Date(cursor);
          cellDate.setDate(cursor.getDate() + dayOffset);
          const count = countsByDate.get(formatDateKey(cellDate)) ?? 0;
          const cell = document.createElement('div');
          cell.className = `history-cell level-${getHistoryLevel(count)}`;
          cell.setAttribute('role', 'img');
          cell.setAttribute('aria-label', `${formatDateLabel(cellDate)} ${count}`);
          cell.title = `${formatDateLabel(cellDate)} ${count}`;
          weekRow.appendChild(cell);
        }

        weekRows.push(weekRow);
      }

      const recentItems = validEntries
        .slice()
        .reverse()
        .slice(0, RECENT_HISTORY_LIMIT)
        .map(({ raw }) => {
          const item = document.createElement('li');
          item.className = 'history-log-item';
          item.textContent = formatHistoryEntry(raw);
          return item;
        });

      historyGraphEl.replaceChildren(...weekRows);
      historyLogEl.replaceChildren(...recentItems);
      historyGraphEl.hidden = false;
      historyLogWrapEl.hidden = recentItems.length === 0;
    }

    function loadHistory() {
      try {
        completionHistory = dedupeHistoryEntries([
          ...SEED_HISTORY,
          ...readHistoryFromStorage(),
        ]);
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        completionHistory = dedupeHistoryEntries([...SEED_HISTORY]);
        setHistoryStatus('Failed to load history. Check your browser storage.');
      }

      renderHistory();
    }

    function recordCompletion() {
      const nextHistory = dedupeHistoryEntries([...completionHistory, new Date().toISOString()]);

      try {
        writeHistoryToStorage(nextHistory);
        completionHistory = nextHistory;
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        setHistoryStatus('Failed to save history. Check your browser storage.');
      }

      renderHistory();
    }

    function createAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        throw new Error('Web Audio API is not supported in this browser.');
      }

      if (!audioContext) {
        audioContext = new AudioContextClass();
      }

      return audioContext;
    }

    async function ensureAudioReady() {
      const ctx = createAudioContext();
      if (ctx.state === 'suspended') {
        await ctx.resume();
      }
    }

    function handleWakeLockRelease() {
      wakeLockSentinel = null;
      if (!isSessionActive() || document.visibilityState !== 'visible') {
        return;
      }

      void requestWakeLock();
    }

    async function enableNoSleepFallback() {
      const controller = getNoSleepController();
      if (!controller) {
        setRuntimeStatus('Wake lock is not supported in this browser.');
        return;
      }

      try {
        if (!noSleepEnabled) {
          await controller.enable();
          noSleepEnabled = true;
        }

        setRuntimeStatus('');
      } catch (error) {
        console.error(error);
        noSleepEnabled = false;
        setRuntimeStatus('Failed to enable wake lock.');
      }
    }

    function disableNoSleepFallback() {
      if (!noSleepEnabled) {
        return;
      }

      const controller = getNoSleepController();
      if (!controller) {
        noSleepEnabled = false;
        return;
      }

      controller.disable();
      noSleepEnabled = false;
    }

    async function requestWakeLock(options = {}) {
      const { fromUserGesture = false } = options;

      if (!isSessionActive() || document.visibilityState !== 'visible') {
        return;
      }

      if (!supportsNativeWakeLock()) {
        if (noSleepEnabled) {
          setRuntimeStatus('');
          return;
        }

        if (!fromUserGesture) {
          setRuntimeStatus('Wake lock can only be enabled on start in this browser.');
          return;
        }

        await enableNoSleepFallback();
        return;
      }

      try {
        if (wakeLockSentinel && !wakeLockSentinel.released) {
          setRuntimeStatus('');
          return;
        }

        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', handleWakeLockRelease);
        setRuntimeStatus('');
      } catch (error) {
        console.error(error);
        wakeLockSentinel = null;
        setRuntimeStatus('Failed to enable wake lock.');
      }
    }

    async function releaseWakeLock() {
      if (!wakeLockSentinel) {
        return;
      }

      const currentWakeLock = wakeLockSentinel;
      wakeLockSentinel = null;

      try {
        await currentWakeLock.release();
      } catch (error) {
        console.error(error);
      }
    }

    async function stopSleepPrevention() {
      disableNoSleepFallback();
      await releaseWakeLock();
    }

    function playTone({ duration, frequency, type, peakGain, offset = 0, sweepTo = frequency }) {
      if (!audioContext) {
        return;
      }

      const startTime = audioContext.currentTime + offset;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      oscillator.frequency.exponentialRampToValueAtTime(sweepTo, startTime + duration);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function playCountdownBeep() {
      playTone({
        duration: 0.18,
        frequency: 880,
        sweepTo: 880,
        type: 'sine',
        peakGain: 0.18
      });
    }

    function playBrightEndingCue() {
      playTone({
        duration: 0.18,
        frequency: 660,
        sweepTo: 660,
        type: 'triangle',
        peakGain: 0.14
      });
      playTone({
        duration: 0.2,
        frequency: 820,
        sweepTo: 820,
        type: 'triangle',
        peakGain: 0.14,
        offset: 0.22
      });
      playTone({
        duration: 0.32,
        frequency: 980,
        sweepTo: 980,
        type: 'triangle',
        peakGain: 0.15,
        offset: 0.48
      });
    }

    function playWorkoutStartCue() {
      playBrightEndingCue();
    }

    function playWorkoutEndCue() {
      playBrightEndingCue();
    }

    function playFanfare() {
      playTone({ duration: 0.15, frequency: 523.25, sweepTo: 523.25, type: 'triangle', peakGain: 0.16, offset: 0 });
      playTone({ duration: 0.15, frequency: 659.25, sweepTo: 659.25, type: 'triangle', peakGain: 0.16, offset: 0.16 });
      playTone({ duration: 0.15, frequency: 783.99, sweepTo: 783.99, type: 'triangle', peakGain: 0.17, offset: 0.32 });
      playTone({ duration: 0.55, frequency: 1046.50, sweepTo: 1046.50, type: 'triangle', peakGain: 0.18, offset: 0.48 });
      playTone({ duration: 0.55, frequency: 523.25, sweepTo: 523.25, type: 'sine', peakGain: 0.10, offset: 0.48 });
      playTone({ duration: 0.55, frequency: 659.25, sweepTo: 659.25, type: 'sine', peakGain: 0.08, offset: 0.48 });
      playTone({ duration: 0.55, frequency: 783.99, sweepTo: 783.99, type: 'sine', peakGain: 0.08, offset: 0.48 });
    }

    function scheduleCountdownSeries(targetDelayMs, shouldPlay = () => true) {
      for (let secondsBefore = COUNTDOWN_CUE_COUNT; secondsBefore >= 1; secondsBefore -= 1) {
        const delayMs = targetDelayMs - (secondsBefore * 1000);
        if (delayMs < 0) {
          continue;
        }

        schedule(() => {
          if (!shouldPlay()) {
            return;
          }

          playCountdownBeep();
        }, delayMs);
      }
    }

    function updateActionButton() {
      if (isSessionActive()) {
        startBtn.textContent = 'Stop';
        startBtn.classList.add('is-stop');
        return;
      }

      startBtn.textContent = 'Start';
      startBtn.classList.remove('is-stop');
      startBtn.disabled = false;
    }

    function clearAllTimers() {
      scheduledTimers.forEach(clearTimeout);
      scheduledTimers = [];

      if (intervalId !== null) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function schedule(callback, delayMs) {
      const timerId = setTimeout(callback, delayMs);
      scheduledTimers.push(timerId);
      return timerId;
    }

    function resetDisplay() {
      appState = 'idle';
      setNowEl.textContent = '0';
      phaseEl.textContent = '⏳ Wait';
      countdownEl.textContent = '--';
      elapsedEl.textContent = '00:00';
      progressFillEl.style.width = '0%';
      updateActionButton();
    }

    function showCompletedDisplay() {
      appState = 'done';
      setNowEl.textContent = String(TOTAL_SETS);
      phaseEl.textContent = '🎉 Done!';
      countdownEl.textContent = '00';
      elapsedEl.textContent = formatMMSS(TOTAL_WORKOUT_SEC);
      progressFillEl.style.width = '100%';
      updateActionButton();
    }

    function stopSequence() {
      clearAllTimers();
      resetDisplay();
      setRuntimeStatus('');
      void stopSleepPrevention();
    }

    function getPhaseInfo(elapsedSec) {
      if (elapsedSec < REST_DURATION_SEC) {
        return { phase: 'rest', set: 0, countdown: REST_DURATION_SEC - elapsedSec };
      }

      const adjusted = elapsedSec - REST_DURATION_SEC;
      const setIndex = Math.min(TOTAL_SETS - 1, Math.floor(adjusted / SET_DURATION_SEC));
      const withinSet = adjusted - setIndex * SET_DURATION_SEC;

      if (withinSet < EXERCISE_DURATION_SEC) {
        return { phase: 'exercise', set: setIndex + 1, countdown: EXERCISE_DURATION_SEC - withinSet };
      }

      return { phase: 'rest', set: setIndex + 1, countdown: SET_DURATION_SEC - withinSet };
    }

    function updateWorkoutUI(now) {
      const elapsedSec = (now - workoutStartAt) / 1000;
      const remainingTotal = Math.max(0, (workoutEndAt - now) / 1000);

      elapsedEl.textContent = formatMMSS(elapsedSec);

      if (remainingTotal <= 0) {
        finishWorkout();
        return;
      }

      const info = getPhaseInfo(elapsedSec);
      setNowEl.textContent = String(info.set);

      if (info.phase === 'exercise') {
        phaseEl.textContent = '💪 Go!';
      } else {
        phaseEl.textContent = info.set === 0 ? '⏳ Wait' : '😌 Rest';
      }

      countdownEl.textContent = String(Math.ceil(info.countdown)).padStart(2, '0');

      const percent = Math.min(100, (elapsedSec / TOTAL_WORKOUT_SEC) * 100);
      progressFillEl.style.width = `${percent}%`;
    }

    function updateUI() {
      const now = performance.now();

      if (appState === 'running') {
        updateWorkoutUI(now);
      }
    }

    function finishWorkout() {
      if (appState !== 'running') {
        return;
      }

      clearAllTimers();
      showCompletedDisplay();
      recordCompletion();
      playFanfare();
      setRuntimeStatus('');
      void stopSleepPrevention();
    }

    function beginWorkout() {
      appState = 'running';
      workoutStartAt = performance.now();
      workoutEndAt = workoutStartAt + TOTAL_WORKOUT_SEC * 1000;
      updateActionButton();
      void requestWakeLock();

      for (let index = 0; index < TOTAL_SETS; index += 1) {
        const exerciseStartMs = (REST_DURATION_SEC + index * SET_DURATION_SEC) * 1000;
        const exerciseEndMs = exerciseStartMs + EXERCISE_DURATION_SEC * 1000;

        scheduleCountdownSeries(exerciseStartMs, () => appState === 'running');

        schedule(() => {
          if (appState !== 'running') {
            return;
          }

          playWorkoutStartCue();
        }, exerciseStartMs);

        if (index < TOTAL_SETS - 1) {
          scheduleCountdownSeries(exerciseEndMs, () => appState === 'running');

          schedule(() => {
            if (appState !== 'running') {
              return;
            }

            playWorkoutEndCue();
          }, exerciseEndMs);
        }
      }

      const totalMs = TOTAL_WORKOUT_SEC * 1000;
      scheduleCountdownSeries(totalMs, () => appState === 'running');

      schedule(() => {
        if (appState !== 'running') {
          return;
        }

        finishWorkout();
      }, totalMs);

      updateUI();
    }

    async function startSequence() {
      if (isSessionActive()) {
        return;
      }

      setHistoryStatus();
      setRuntimeStatus('');

      clearAllTimers();

      const wakeLockPromise = requestWakeLock({ fromUserGesture: true });

      try {
        await ensureAudioReady();
        await wakeLockPromise;
      } catch (error) {
        console.error(error);
        resetDisplay();
        setRuntimeStatus('Failed to start audio.');
        void stopSleepPrevention();
        return;
      }

      beginWorkout();
      intervalId = setInterval(updateUI, 100);
    }

    document.addEventListener('visibilitychange', () => {
      if (!isSessionActive()) {
        return;
      }

      if (document.visibilityState === 'visible') {
        void requestWakeLock();
        return;
      }

      void releaseWakeLock();
    });

    window.addEventListener('pageshow', () => {
      if (!isSessionActive()) {
        return;
      }

      void requestWakeLock();
    });

    startBtn.addEventListener('click', () => {
      if (isSessionActive()) {
        stopSequence();
        return;
      }

      void startSequence();
    });

    loadHistory();
    resetDisplay();
  </script>
</body>
</html>
