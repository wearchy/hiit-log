<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🔥 HIIT-LOG</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --sub: #94a3b8;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --danger: #ef4444;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 560px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .label {
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .phase {
      font-size: 20px;
      font-weight: 600;
    }

    .progress-wrap {
      margin: 18px 0 22px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .bar {
      height: 12px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.2s linear;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    #startBtn {
      background: var(--accent);
      color: #062b12;
    }

    #stopBtn {
      background: #1f2937;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .history {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .history-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .history-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .history-count {
      color: var(--sub);
      font-size: 13px;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .history-item {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }

    .history-empty {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .history-status {
      min-height: 1.2em;
      margin: 10px 0 0;
      color: #fca5a5;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .grid,
      .buttons {
        grid-template-columns: 1fr;
      }

      .history-title {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🔥 HIIT-LOG</h1>

    <section class="grid">
      <div class="card">
        <div class="label">現在のセット</div>
        <div class="value"><span id="setNow">0</span> / 8</div>
      </div>
      <div class="card">
        <div class="label">状態</div>
        <div class="phase" id="phase">待機中</div>
      </div>
      <div class="card">
        <div class="label">次の合図まで</div>
        <div class="value" id="countdown">--</div>
      </div>
      <div class="card">
        <div class="label">経過時間</div>
        <div class="value" id="elapsed">00:00</div>
      </div>
    </section>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>全体進捗</span>
        <span id="progressText">0 / 8 セット完了</span>
      </div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div class="buttons">
      <button id="startBtn">開始</button>
      <button id="stopBtn">停止・リセット</button>
    </div>

    <section class="history" aria-labelledby="historyHeading">
      <div class="history-title">
        <h2 id="historyHeading">実施履歴</h2>
        <span class="history-count" id="historyCount">保存件数: 0件</span>
      </div>
      <ul class="history-list" id="historyList"></ul>
      <p class="history-empty" id="historyEmpty">まだ記録はありません。</p>
      <p class="history-status" id="historyStatus" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const TOTAL_SETS = 8;
    const FIRST_BEEP_SEC = 20;
    const SECOND_BEEP_SEC = 30;
    const SET_DURATION_SEC = 30;
    const START_COUNTDOWN_SEC = 5;
    const HISTORY_KEY = 'hiit-log-history';

    let audioContext = null;
    let scheduledTimers = [];
    let intervalId = null;
    let appState = 'idle';
    let countdownStartAt = 0;
    let workoutStartAt = 0;
    let workoutEndAt = 0;
    let completionHistory = [];

    const setNowEl = document.getElementById('setNow');
    const phaseEl = document.getElementById('phase');
    const countdownEl = document.getElementById('countdown');
    const elapsedEl = document.getElementById('elapsed');
    const progressFillEl = document.getElementById('progressFill');
    const progressTextEl = document.getElementById('progressText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const historyListEl = document.getElementById('historyList');
    const historyEmptyEl = document.getElementById('historyEmpty');
    const historyCountEl = document.getElementById('historyCount');
    const historyStatusEl = document.getElementById('historyStatus');

    function formatMMSS(totalSeconds) {
      const seconds = Math.max(0, Math.floor(totalSeconds));
      const minutesText = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secondsText = String(seconds % 60).padStart(2, '0');
      return `${minutesText}:${secondsText}`;
    }

    function formatHistoryEntry(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
    }

    function setHistoryStatus(message = '') {
      historyStatusEl.textContent = message;
    }

    function readHistoryFromStorage() {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw === null) {
        return [];
      }

      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.some((entry) => typeof entry !== 'string')) {
        throw new Error('Stored history data is invalid.');
      }

      return parsed;
    }

    function writeHistoryToStorage(entries) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(entries));
    }

    function renderHistory() {
      historyCountEl.textContent = `保存件数: ${completionHistory.length}件`;

      const items = completionHistory
        .slice()
        .reverse()
        .map((entry) => {
          const item = document.createElement('li');
          item.className = 'history-item';
          item.textContent = formatHistoryEntry(entry);
          return item;
        });

      historyListEl.replaceChildren(...items);
      historyEmptyEl.hidden = items.length > 0;
    }

    function loadHistory() {
      try {
        completionHistory = readHistoryFromStorage();
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        completionHistory = [];
        setHistoryStatus('履歴の読み込みに失敗しました。ブラウザーの保存データを確認してください。');
      }

      renderHistory();
    }

    function recordCompletion() {
      const nextHistory = [...completionHistory, new Date().toISOString()];

      try {
        writeHistoryToStorage(nextHistory);
        completionHistory = nextHistory;
        setHistoryStatus();
      } catch (error) {
        console.error(error);
        setHistoryStatus('履歴の保存に失敗しました。ブラウザーの保存容量を確認してください。');
      }

      renderHistory();
    }

    function createAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        throw new Error('Web Audio API is not supported in this browser.');
      }

      if (!audioContext) {
        audioContext = new AudioContextClass();
      }

      return audioContext;
    }

    async function ensureAudioReady() {
      const ctx = createAudioContext();
      if (ctx.state === 'suspended') {
        await ctx.resume();
      }
    }

    function playTone({ duration, frequency, type, peakGain, offset = 0, sweepTo = frequency }) {
      if (!audioContext) {
        return;
      }

      const startTime = audioContext.currentTime + offset;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      oscillator.frequency.exponentialRampToValueAtTime(sweepTo, startTime + duration);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function playCountdownBeep() {
      playTone({
        duration: 0.18,
        frequency: 880,
        sweepTo: 880,
        type: 'sine',
        peakGain: 0.18
      });
    }

    function playWorkoutBuzzer() {
      if (!audioContext) {
        return;
      }

      const startTime = audioContext.currentTime;
      const duration = 0.68;
      const gainNode = audioContext.createGain();
      const toneDefinitions = [
        { type: 'square', frequency: 170, sweepTo: 148 },
        { type: 'sawtooth', frequency: 86, sweepTo: 74 }
      ];

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(0.28, startTime + 0.02);
      gainNode.gain.setValueAtTime(0.28, startTime + 0.54);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
      gainNode.connect(audioContext.destination);

      toneDefinitions.forEach(({ type, frequency, sweepTo }) => {
        const oscillator = audioContext.createOscillator();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startTime);
        oscillator.frequency.linearRampToValueAtTime(sweepTo, startTime + duration);
        oscillator.connect(gainNode);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration + 0.05);
      });
    }

    function clearAllTimers() {
      scheduledTimers.forEach(clearTimeout);
      scheduledTimers = [];

      if (intervalId !== null) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function schedule(callback, delayMs) {
      const timerId = setTimeout(callback, delayMs);
      scheduledTimers.push(timerId);
      return timerId;
    }

    function resetDisplay() {
      appState = 'idle';
      setNowEl.textContent = '0';
      phaseEl.textContent = '待機中';
      countdownEl.textContent = '--';
      elapsedEl.textContent = '00:00';
      progressFillEl.style.width = '0%';
      progressTextEl.textContent = '0 / 8 セット完了';
      startBtn.disabled = false;
    }

    function showCompletedDisplay() {
      appState = 'done';
      setNowEl.textContent = String(TOTAL_SETS);
      phaseEl.textContent = '待機中';
      countdownEl.textContent = '00';
      elapsedEl.textContent = formatMMSS(TOTAL_SETS * SET_DURATION_SEC);
      progressFillEl.style.width = '100%';
      progressTextEl.textContent = '8 / 8 セット完了';
      startBtn.disabled = false;
    }

    function stopSequence() {
      clearAllTimers();
      resetDisplay();
    }

    function getCurrentSet(elapsedSec) {
      return Math.min(TOTAL_SETS, Math.floor(elapsedSec / SET_DURATION_SEC) + 1);
    }

    function updateCountdownUI(now) {
      const elapsedSec = (now - countdownStartAt) / 1000;
      const remainingSec = Math.max(0, START_COUNTDOWN_SEC - elapsedSec);

      setNowEl.textContent = '0';
      phaseEl.textContent = '待機中';
      countdownEl.textContent = String(Math.ceil(remainingSec)).padStart(2, '0');
      elapsedEl.textContent = '00:00';
      progressFillEl.style.width = '0%';
      progressTextEl.textContent = '0 / 8 セット完了';
    }

    function updateWorkoutUI(now) {
      const elapsedSec = (now - workoutStartAt) / 1000;
      const remainingTotal = Math.max(0, (workoutEndAt - now) / 1000);

      elapsedEl.textContent = formatMMSS(elapsedSec);

      if (remainingTotal <= 0) {
        finishWorkout();
        return;
      }

      const currentSet = getCurrentSet(elapsedSec);
      const setElapsed = elapsedSec % SET_DURATION_SEC;
      const nextBeepIn = setElapsed < FIRST_BEEP_SEC
        ? FIRST_BEEP_SEC - setElapsed
        : SECOND_BEEP_SEC - setElapsed;

      setNowEl.textContent = String(currentSet);
      phaseEl.textContent = setElapsed < FIRST_BEEP_SEC ? '運動中' : '休憩中';
      countdownEl.textContent = String(Math.ceil(nextBeepIn)).padStart(2, '0');

      const completedSets = Math.floor(elapsedSec / SET_DURATION_SEC);
      const percent = Math.min(100, (elapsedSec / (TOTAL_SETS * SET_DURATION_SEC)) * 100);
      progressFillEl.style.width = `${percent}%`;
      progressTextEl.textContent = `${completedSets} / 8 セット完了`;
    }

    function updateUI() {
      const now = performance.now();

      if (appState === 'countdown') {
        updateCountdownUI(now);
        return;
      }

      if (appState === 'running') {
        updateWorkoutUI(now);
      }
    }

    function finishWorkout() {
      if (appState !== 'running') {
        return;
      }

      clearAllTimers();
      showCompletedDisplay();
      recordCompletion();
    }

    function beginWorkout() {
      appState = 'running';
      workoutStartAt = performance.now();
      workoutEndAt = workoutStartAt + TOTAL_SETS * SET_DURATION_SEC * 1000;
      playWorkoutBuzzer();

      for (let index = 0; index < TOTAL_SETS; index += 1) {
        const setIndex = index + 1;
        const baseDelay = index * SET_DURATION_SEC * 1000;

        schedule(() => {
          if (appState !== 'running') {
            return;
          }

          playWorkoutBuzzer();
        }, baseDelay + FIRST_BEEP_SEC * 1000);

        schedule(() => {
          if (appState !== 'running') {
            return;
          }

          playWorkoutBuzzer();
          progressTextEl.textContent = `${setIndex} / 8 セット完了`;
          progressFillEl.style.width = `${(setIndex / TOTAL_SETS) * 100}%`;
        }, baseDelay + SECOND_BEEP_SEC * 1000);
      }

      schedule(() => {
        if (appState !== 'running') {
          return;
        }

        finishWorkout();
      }, TOTAL_SETS * SET_DURATION_SEC * 1000);

      updateUI();
    }

    async function startSequence() {
      if (appState === 'countdown' || appState === 'running') {
        return;
      }

      startBtn.disabled = true;
      setHistoryStatus();

      try {
        await ensureAudioReady();
      } catch (error) {
        console.error(error);
        phaseEl.textContent = '待機中';
        countdownEl.textContent = '--';
        startBtn.disabled = false;
        return;
      }

      clearAllTimers();
      appState = 'countdown';
      countdownStartAt = performance.now();
      updateUI();
      intervalId = setInterval(updateUI, 100);

      for (let count = 0; count < START_COUNTDOWN_SEC; count += 1) {
        schedule(() => {
          if (appState !== 'countdown') {
            return;
          }

          playCountdownBeep();
        }, count * 1000);
      }

      schedule(() => {
        if (appState !== 'countdown') {
          return;
        }

        beginWorkout();
      }, START_COUNTDOWN_SEC * 1000);
    }

    startBtn.addEventListener('click', startSequence);
    stopBtn.addEventListener('click', stopSequence);

    loadHistory();
    resetDisplay();
  </script>
</body>
</html>
