<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🎛️ HIIT-LOG 音サンプル</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --sub: #94a3b8;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100dvh;
      padding: 20px;
    }

    .app {
      width: min(100%, 1080px);
      margin: 0 auto;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.2;
    }

    .lead {
      margin: 0 0 18px;
      color: var(--sub);
      line-height: 1.7;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .stop-button {
      background: #1f2937;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      color: var(--sub);
      font-size: 14px;
      min-height: 1.4em;
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .group {
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .group h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .group p {
      margin: 0 0 14px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.6;
    }

    .sample-list {
      display: grid;
      gap: 10px;
    }

    .sample-button {
      width: 100%;
      text-align: left;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.16), rgba(34, 197, 94, 0.1));
      color: var(--text);
      border: 1px solid rgba(56, 189, 248, 0.22);
    }

    .sample-button:hover {
      border-color: rgba(56, 189, 248, 0.48);
    }

    @media (max-width: 820px) {
      .groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🎛️ HIIT-LOG 音サンプル</h1>
    <p class="lead">
      ボタンを押すと、そのカテゴリの候補音を試聴できます。<br />
      いまの本体仕様に合わせて、カウントダウン・運動開始・運動終了（休憩開始）・休憩終了は 3 回鳴るパターンを中心にしています。
    </p>

    <div class="toolbar">
      <button class="stop-button" id="stopBtn">停止</button>
      <div class="status" id="status">試聴したいボタンを押してください。</div>
    </div>

    <div class="groups" id="groups"></div>
  </main>

  <script>
    let audioContext = null;
    let scheduledTimeouts = [];
    let playbackToken = 0;
    let activeOscillators = [];

    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const groupsEl = document.getElementById('groups');

    function createAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        throw new Error('Web Audio API is not supported in this browser.');
      }

      if (!audioContext) {
        audioContext = new AudioContextClass();
      }

      return audioContext;
    }

    async function ensureAudioReady() {
      const ctx = createAudioContext();
      if (ctx.state === 'suspended') {
        await ctx.resume();
      }
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function clearPlayback() {
      playbackToken += 1;
      scheduledTimeouts.forEach(clearTimeout);
      scheduledTimeouts = [];
      activeOscillators.forEach((oscillator) => {
        try {
          oscillator.stop();
        } catch (error) {
          console.error(error);
        }
      });
      activeOscillators = [];
    }

    function schedule(callback, delayMs) {
      const timerId = setTimeout(callback, delayMs);
      scheduledTimeouts.push(timerId);
    }

    function playTone({ at = 0, duration, frequency, sweepTo = frequency, type, peakGain }) {
      if (!audioContext) {
        return;
      }

      const startTime = audioContext.currentTime + at;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      oscillator.frequency.linearRampToValueAtTime(sweepTo, startTime + duration);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.addEventListener('ended', () => {
        activeOscillators = activeOscillators.filter((node) => node !== oscillator);
      });
      activeOscillators.push(oscillator);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.04);
    }

    function toneEvent({
      at = 0,
      duration = 0.18,
      frequency = 880,
      sweepTo = frequency,
      type = 'sine',
      peakGain = 0.18
    }) {
      return [{ at, duration, frequency, sweepTo, type, peakGain }];
    }

    function layeredEvents(at, duration, layers) {
      return layers.map((layer) => ({
        at,
        duration,
        frequency: layer.frequency,
        sweepTo: layer.sweepTo ?? layer.frequency,
        type: layer.type,
        peakGain: layer.peakGain
      }));
    }

    function shiftEvents(events, shiftSec) {
      return events.map((event) => ({
        ...event,
        at: event.at + shiftSec
      }));
    }

    function repeatEvents(events, repeatCount, gapSec) {
      const repeated = [];

      for (let index = 0; index < repeatCount; index += 1) {
        repeated.push(...shiftEvents(events, index * gapSec));
      }

      return repeated;
    }

    function createCurrentCountdownUnit() {
      return toneEvent({
        duration: 0.18,
        frequency: 880,
        sweepTo: 880,
        type: 'sine',
        peakGain: 0.18
      });
    }

    function createBuzzUnit({
      duration = 0.68,
      lowFrequency = 170,
      lowSweepTo = 148,
      highFrequency = 86,
      highSweepTo = 74,
      lowType = 'square',
      highType = 'sawtooth',
      lowGain = 0.28,
      highGain = 0.16
    }) {
      return layeredEvents(0, duration, [
        {
          type: lowType,
          frequency: lowFrequency,
          sweepTo: lowSweepTo,
          peakGain: lowGain
        },
        {
          type: highType,
          frequency: highFrequency,
          sweepTo: highSweepTo,
          peakGain: highGain
        }
      ]);
    }

    function createHornUnit({
      duration = 0.44,
      baseFrequency = 220,
      baseSweepTo = 260,
      overlayFrequency = 440,
      overlaySweepTo = 520,
      baseType = 'triangle',
      overlayType = 'sine',
      baseGain = 0.22,
      overlayGain = 0.1
    }) {
      return layeredEvents(0, duration, [
        {
          type: baseType,
          frequency: baseFrequency,
          sweepTo: baseSweepTo,
          peakGain: baseGain
        },
        {
          type: overlayType,
          frequency: overlayFrequency,
          sweepTo: overlaySweepTo,
          peakGain: overlayGain
        }
      ]);
    }

    function createTwoStepUnit(firstEvents, secondEvents, gapSec) {
      return [...firstEvents, ...shiftEvents(secondEvents, gapSec)];
    }

    function getPatternDuration(events) {
      return events.reduce((maxEnd, event) => Math.max(maxEnd, event.at + event.duration), 0);
    }

    function createCurrentStartPattern() {
      return repeatEvents(createBuzzUnit({}), 3, 0.86);
    }

    function createCurrentEndPattern() {
      return repeatEvents(createBuzzUnit({}), 3, 0.86);
    }

    function createCurrentOverallPattern() {
      return repeatEvents(createBuzzUnit({}), 3, 0.92);
    }

    const sampleGroups = [
      {
        title: 'カウントダウン時',
        description: '最後の 3 秒で鳴る候補音です。',
        patterns: [
          { name: '1. 現行ビープ3連', build: () => repeatEvents(createCurrentCountdownUnit(), 3, 0.75) },
          { name: '2. 高めビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.14, frequency: 1040, type: 'sine', peakGain: 0.18 }), 3, 0.68) },
          { name: '3. 丸いビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.24, frequency: 760, type: 'triangle', peakGain: 0.16 }), 3, 0.76) },
          { name: '4. 鋭いビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.11, frequency: 680, type: 'square', peakGain: 0.1 }), 3, 0.6) },
          { name: '5. 上がるビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.2, frequency: 740, sweepTo: 1080, type: 'triangle', peakGain: 0.17 }), 3, 0.76) },
          { name: '6. 下がるビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.19, frequency: 1180, sweepTo: 780, type: 'sine', peakGain: 0.16 }), 3, 0.74) },
          { name: '7. 二層ビープ3連', build: () => repeatEvents(layeredEvents(0, 0.16, [{ type: 'sine', frequency: 840, sweepTo: 840, peakGain: 0.15 }, { type: 'triangle', frequency: 1260, sweepTo: 1260, peakGain: 0.08 }]), 3, 0.72) },
          { name: '8. 短いクリック3連', build: () => repeatEvents(toneEvent({ duration: 0.07, frequency: 960, type: 'square', peakGain: 0.08 }), 3, 0.55) },
          { name: '9. 長めビープ3連', build: () => repeatEvents(toneEvent({ duration: 0.3, frequency: 820, type: 'sine', peakGain: 0.14 }), 3, 0.85) },
          {
            name: '10. 最後だけ高い3連',
            build: () => [
              ...createCurrentCountdownUnit(),
              ...shiftEvents(createCurrentCountdownUnit(), 0.75),
              ...shiftEvents(toneEvent({ duration: 0.22, frequency: 1080, sweepTo: 1180, type: 'sine', peakGain: 0.18 }), 1.5)
            ]
          }
        ]
      },
      {
        title: '運動開始時',
        description: '運動開始と休憩終了で鳴らす候補音です。',
        patterns: [
          { name: '1. 現行ブザー3連', build: createCurrentStartPattern },
          { name: '2. 低めブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.72, lowFrequency: 142, lowSweepTo: 124, highFrequency: 72, highSweepTo: 62, lowGain: 0.32, highGain: 0.16 }), 3, 0.9) },
          { name: '3. 厚めブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.82, lowFrequency: 190, lowSweepTo: 176, highFrequency: 96, highSweepTo: 82, lowGain: 0.28, highGain: 0.18 }), 3, 0.96) },
          { name: '4. 上がるホーン3連', build: () => repeatEvents(createHornUnit({ duration: 0.46, baseFrequency: 210, baseSweepTo: 286, overlayFrequency: 420, overlaySweepTo: 610, baseGain: 0.23, overlayGain: 0.1 }), 3, 0.8) },
          { name: '5. 警告ブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.42, lowFrequency: 248, lowSweepTo: 228, highFrequency: 124, highSweepTo: 110, lowGain: 0.22, highGain: 0.12 }), 3, 0.66) },
          { name: '6. 二段ホーン3連', build: () => repeatEvents(createTwoStepUnit(createHornUnit({ duration: 0.24, baseFrequency: 200, baseSweepTo: 220, overlayFrequency: 400, overlaySweepTo: 460, baseGain: 0.2, overlayGain: 0.08 }), createHornUnit({ duration: 0.22, baseFrequency: 250, baseSweepTo: 320, overlayFrequency: 500, overlaySweepTo: 620, baseGain: 0.21, overlayGain: 0.09 }), 0.16), 3, 0.86) },
          { name: '7. 金属ブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.56, lowFrequency: 226, lowSweepTo: 206, highFrequency: 452, highSweepTo: 390, lowType: 'sawtooth', highType: 'triangle', lowGain: 0.16, highGain: 0.12 }), 3, 0.78) },
          { name: '8. 低音パンチ3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.38, lowFrequency: 126, lowSweepTo: 118, highFrequency: 62, highSweepTo: 58, lowGain: 0.3, highGain: 0.12 }), 3, 0.62) },
          { name: '9. 明るめホーン3連', build: () => repeatEvents(createHornUnit({ duration: 0.4, baseFrequency: 260, baseSweepTo: 340, overlayFrequency: 520, overlaySweepTo: 700, baseType: 'triangle', overlayType: 'triangle', baseGain: 0.18, overlayGain: 0.08 }), 3, 0.74) },
          { name: '10. サイレン寄り3連', build: () => repeatEvents(createTwoStepUnit(createBuzzUnit({ duration: 0.22, lowFrequency: 220, lowSweepTo: 260, highFrequency: 110, highSweepTo: 130, lowGain: 0.18, highGain: 0.1 }), createBuzzUnit({ duration: 0.22, lowFrequency: 260, lowSweepTo: 220, highFrequency: 130, highSweepTo: 110, lowGain: 0.18, highGain: 0.1 }), 0.2), 3, 0.76) }
        ]
      },
      {
        title: '運動終了時（休憩開始時）',
        description: '運動から休憩へ切り替わる候補音です。',
        patterns: [
          { name: '1. 現行ブザー3連', build: createCurrentEndPattern },
          { name: '2. 下がるブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.64, lowFrequency: 200, lowSweepTo: 126, highFrequency: 104, highSweepTo: 62, lowGain: 0.22, highGain: 0.12 }), 3, 0.84) },
          { name: '3. 柔らかい終了音3連', build: () => repeatEvents(createHornUnit({ duration: 0.34, baseFrequency: 360, baseSweepTo: 220, overlayFrequency: 720, overlaySweepTo: 440, baseType: 'triangle', overlayType: 'sine', baseGain: 0.16, overlayGain: 0.07 }), 3, 0.68) },
          { name: '4. ドンッ3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.26, lowFrequency: 118, lowSweepTo: 92, highFrequency: 58, highSweepTo: 44, lowGain: 0.28, highGain: 0.1 }), 3, 0.58) },
          { name: '5. 二段下降3連', build: () => repeatEvents(createTwoStepUnit(createHornUnit({ duration: 0.18, baseFrequency: 320, baseSweepTo: 260, overlayFrequency: 640, overlaySweepTo: 520, baseGain: 0.16, overlayGain: 0.08 }), createHornUnit({ duration: 0.22, baseFrequency: 240, baseSweepTo: 180, overlayFrequency: 480, overlaySweepTo: 360, baseGain: 0.15, overlayGain: 0.07 }), 0.16), 3, 0.82) },
          { name: '6. 控えめブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.48, lowFrequency: 180, lowSweepTo: 150, highFrequency: 92, highSweepTo: 76, lowGain: 0.16, highGain: 0.09 }), 3, 0.72) },
          { name: '7. 三角下降3連', build: () => repeatEvents(toneEvent({ duration: 0.24, frequency: 540, sweepTo: 280, type: 'triangle', peakGain: 0.16 }), 3, 0.72) },
          { name: '8. 低いサイン3連', build: () => repeatEvents(toneEvent({ duration: 0.22, frequency: 280, sweepTo: 220, type: 'sine', peakGain: 0.18 }), 3, 0.68) },
          { name: '9. ショートブザー3連', build: () => repeatEvents(createBuzzUnit({ duration: 0.18, lowFrequency: 208, lowSweepTo: 176, highFrequency: 104, highSweepTo: 88, lowGain: 0.18, highGain: 0.1 }), 3, 0.44) },
          { name: '10. 余韻あり3連', build: () => repeatEvents(createHornUnit({ duration: 0.48, baseFrequency: 320, baseSweepTo: 220, overlayFrequency: 640, overlaySweepTo: 420, baseType: 'sine', overlayType: 'triangle', baseGain: 0.15, overlayGain: 0.06 }), 3, 0.88) }
        ]
      },
      {
        title: '全体終了時',
        description: '最後に鳴らす候補音です。',
        patterns: [
          { name: '1. 現行ブザー3連', build: createCurrentOverallPattern },
          { name: '2. 上昇ファンファーレ', build: () => [...toneEvent({ duration: 0.2, frequency: 320, sweepTo: 360, type: 'triangle', peakGain: 0.16 }), ...shiftEvents(toneEvent({ duration: 0.22, frequency: 420, sweepTo: 500, type: 'triangle', peakGain: 0.16 }), 0.24), ...shiftEvents(toneEvent({ duration: 0.34, frequency: 560, sweepTo: 720, type: 'triangle', peakGain: 0.18 }), 0.52)] },
          { name: '3. 下降ファンファーレ', build: () => [...toneEvent({ duration: 0.22, frequency: 620, sweepTo: 560, type: 'triangle', peakGain: 0.16 }), ...shiftEvents(toneEvent({ duration: 0.22, frequency: 500, sweepTo: 440, type: 'triangle', peakGain: 0.16 }), 0.24), ...shiftEvents(toneEvent({ duration: 0.34, frequency: 380, sweepTo: 260, type: 'triangle', peakGain: 0.18 }), 0.52)] },
          { name: '4. 短短長', build: () => [...repeatEvents(createBuzzUnit({ duration: 0.18, lowFrequency: 200, lowSweepTo: 184, highFrequency: 100, highSweepTo: 92, lowGain: 0.18, highGain: 0.1 }), 2, 0.34), ...shiftEvents(createBuzzUnit({ duration: 0.6, lowFrequency: 188, lowSweepTo: 140, highFrequency: 94, highSweepTo: 72, lowGain: 0.24, highGain: 0.12 }), 0.74)] },
          { name: '5. 長めホーン', build: () => createHornUnit({ duration: 0.92, baseFrequency: 220, baseSweepTo: 300, overlayFrequency: 440, overlaySweepTo: 620, baseGain: 0.22, overlayGain: 0.1 }) },
          { name: '6. チャイム寄り', build: () => [...toneEvent({ duration: 0.18, frequency: 660, type: 'triangle', peakGain: 0.14 }), ...shiftEvents(toneEvent({ duration: 0.2, frequency: 820, type: 'triangle', peakGain: 0.14 }), 0.22), ...shiftEvents(toneEvent({ duration: 0.32, frequency: 980, type: 'triangle', peakGain: 0.15 }), 0.48)] },
          { name: '7. 重めフィニッシュ', build: () => [...createBuzzUnit({ duration: 0.42, lowFrequency: 140, lowSweepTo: 126, highFrequency: 70, highSweepTo: 62, lowGain: 0.28, highGain: 0.12 }), ...shiftEvents(createBuzzUnit({ duration: 0.56, lowFrequency: 196, lowSweepTo: 150, highFrequency: 98, highSweepTo: 74, lowGain: 0.22, highGain: 0.1 }), 0.34)] },
          { name: '8. 明るい終止', build: () => [...toneEvent({ duration: 0.14, frequency: 520, sweepTo: 580, type: 'sine', peakGain: 0.12 }), ...shiftEvents(toneEvent({ duration: 0.14, frequency: 680, sweepTo: 760, type: 'sine', peakGain: 0.12 }), 0.16), ...shiftEvents(toneEvent({ duration: 0.38, frequency: 860, sweepTo: 980, type: 'triangle', peakGain: 0.16 }), 0.34)] },
          { name: '9. 静かな締め', build: () => [...toneEvent({ duration: 0.24, frequency: 420, sweepTo: 380, type: 'sine', peakGain: 0.11 }), ...shiftEvents(toneEvent({ duration: 0.26, frequency: 360, sweepTo: 320, type: 'sine', peakGain: 0.11 }), 0.28), ...shiftEvents(toneEvent({ duration: 0.44, frequency: 300, sweepTo: 220, type: 'triangle', peakGain: 0.12 }), 0.58)] },
          { name: '10. アラーム寄り', build: () => [...repeatEvents(createTwoStepUnit(createBuzzUnit({ duration: 0.16, lowFrequency: 240, lowSweepTo: 260, highFrequency: 120, highSweepTo: 130, lowGain: 0.18, highGain: 0.1 }), createBuzzUnit({ duration: 0.16, lowFrequency: 260, lowSweepTo: 240, highFrequency: 130, highSweepTo: 120, lowGain: 0.18, highGain: 0.1 }), 0.16), 2, 0.46), ...shiftEvents(createBuzzUnit({ duration: 0.5, lowFrequency: 220, lowSweepTo: 170, highFrequency: 110, highSweepTo: 84, lowGain: 0.24, highGain: 0.12 }), 1.04)] }
        ]
      }
    ];

    async function playPattern(groupTitle, pattern) {
      clearPlayback();
      const token = playbackToken;

      try {
        await ensureAudioReady();
      } catch (error) {
        console.error(error);
        setStatus('音声を開始できませんでした。');
        return;
      }

      const events = pattern.build();
      const totalDuration = getPatternDuration(events);
      setStatus(`${groupTitle} / ${pattern.name} を再生中`);

      events.forEach((event) => {
        schedule(() => {
          if (token !== playbackToken) {
            return;
          }

          playTone({
            ...event,
            at: 0
          });
        }, event.at * 1000);
      });

      schedule(() => {
        if (token !== playbackToken) {
          return;
        }

        setStatus(`${groupTitle} / ${pattern.name} の再生が終わりました。`);
      }, (totalDuration + 0.08) * 1000);
    }

    function createSampleButton(groupTitle, pattern) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'sample-button';
      button.textContent = pattern.name;
      button.addEventListener('click', () => {
        void playPattern(groupTitle, pattern);
      });
      return button;
    }

    function renderGroups() {
      const groupSections = sampleGroups.map((group) => {
        const section = document.createElement('section');
        section.className = 'group';

        const title = document.createElement('h2');
        title.textContent = group.title;

        const description = document.createElement('p');
        description.textContent = group.description;

        const list = document.createElement('div');
        list.className = 'sample-list';
        group.patterns.forEach((pattern) => {
          list.appendChild(createSampleButton(group.title, pattern));
        });

        section.append(title, description, list);
        return section;
      });

      groupsEl.replaceChildren(...groupSections);
    }

    stopBtn.addEventListener('click', () => {
      clearPlayback();
      setStatus('停止しました。');
    });

    renderGroups();
  </script>
</body>
</html>
